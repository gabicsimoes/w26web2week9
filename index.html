<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- This is the link to the bootstrap CSS via a CDN, or content delivery network -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Week 9 Demo - First look at bootstrap</title>
</head>
<body>
    <!-- container classes allow you to set the width of your element relative to different breakpoints the default container class is max width at all sizes -->
    <header class="container bg-dark">
        <!-- bootstrap works by applying classes in HTML to apply specific styling -->
        <h1 class="display-1 text-center text-info">Large Display Header</h1>
    </header>

    <!-- containers can also make things full screen up to certain point, like the large (lg) breakpoint -->
    <main class="container-lg bg-danger">
        <!-- bootstrap no longer uses "right" and "left" but "start" and "end", like flexbox and grid -->
         <!-- bootstrap has a set of breakpoints, which are integrated into their classes uusing sm, md, lg, xl, xxl (the smallest size doens't need a class) -->
        <h2 class="h2 text-center text-lg-end">
            Secondary Header
            <p class="text-body-secondary">Faded Secondary Text</p>
        </h2>
        <!-- to create a bootstrap grid, you need a container, rows, and columns (all classes) -->
        <section class="container">
            <div class="row">
            <!-- bootstrap has a series of colours you can apply to your elements -->
             <p class="col-md-5 col-lg-12 text-primary bg-secondary">Primary Text Colour</p>
             <p class="col-md offset-lg-3 text-warning bg-light">Warning Text Colour</p>
             <p class="col-md offset-lg-5 text-danger bg-info">Danger Text Colour</p>
             <p class="col-md-3 col-lg-5 text-light bg-dark">Light Text Colour</p>
             <!-- you can set the columns to shift to vertical at specific breakpoints, or tell the columns to take up a certain number of column spaces (up to 12) 
              you can add multiple breakpoint classes so the columns are different sizes at different breakpoints
              offset tells the column to leave space between it and the previous column -->
            </div>
        </section>
    </main>
    
</body>
<!-- any javascript is always placed at the bottom of the site, so it loads after the site has loaded -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
